<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সিকিউরিটি ড্যাশবোর্ড - ওটিপি ভেরিফিকেশন</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        .message { margin-top: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🔒 সিকিউরিটি লগইন</h2>
        
        <!-- ওটিপি পাঠানোর ফর্ম -->
        <div id="step-1">
            <p>আপনার টেলিগ্রাম ইউজারনেম দিন (যেমন: @username)</p>
            <input type="text" id="username" placeholder="Telegram Username">
            <button onclick="sendOtp()">ওটিপি পাঠান</button>
        </div>

        <!-- ওটিপি ভেরিফাই করার ফর্ম -->
        <div id="step-2" style="display: none; margin-top: 15px;">
            <p>টেলিগ্রামে যাওয়া ৪ ডিজিটের ওটিপি কোডটি লিখুন</p>
            <input type="text" id="otp-code" placeholder="Enter 4-digit OTP">
            <button onclick="verifyOtp()">লগইন করুন</button>
        </div>

        <div class="message" id="response-msg"></div>
    </div>

    <script>
        let currentUsername = "";

        function sendOtp() {
            const usernameInput = document.getElementById('username').value.trim();
            const msgDiv = document.getElementById('response-msg');

            if (!usernameInput) {
                msgDiv.style.color = "red";
                msgDiv.innerText = "দয়া করে ইউজারনেম লিখুন!";
                return;
            }

            currentUsername = usernameInput;
            msgDiv.style.color = "blue";
            msgDiv.innerText = "ওটিপি পাঠানো হচ্ছে...";

            fetch('/send-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: currentUsername })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    msgDiv.style.color = "green";
                    msgDiv.innerText = data.message;
                    document.getElementById('step-1').style.display = 'none';
                    document.getElementById('step-2').style.display = 'block';
                } else {
                    msgDiv.style.color = "red";
                    msgDiv.innerText = data.message;
                }
            })
            .catch(error => {
                msgDiv.style.color = "red";
                msgDiv.innerText = "সার্ভার এরর!";
                console.error('Error:', error);
            });
        }

        function verifyOtp() {
            const otpInput = document.getElementById('otp-code').value.trim();
            const msgDiv = document.getElementById('response-msg');

            if (!otpInput) {
                msgDiv.style.color = "red";
                msgDiv.innerText = "ওটিপি কোড দিন!";
                return;
            }

            msgDiv.style.color = "blue";
            msgDiv.innerText = "ভেরিফাই হচ্ছে...";

            fetch('/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: currentUsername, otp: otpInput })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    msgDiv.style.color = "green";
                    msgDiv.innerText = data.message;
                    setTimeout(() => {
                        alert("স্বাগতম! আপনি সফলভাবে লগইন করেছেন।");
                        location.reload();
                    }, 1000);
                } else {
                    msgDiv.style.color = "red";
                    msgDiv.innerText = data.message;
                }
            })
            .catch(error => {
                msgDiv.style.color = "red";
                msgDiv.innerText = "সার্ভার এরর!";
                console.error('Error:', error);
            });
        }
    </script>
</body>
</html>
