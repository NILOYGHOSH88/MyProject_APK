<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacker Terminal - Secure Dashboard</title>
    <style>
        :root {
            --bg-color: #030303;
            --card-bg: #080808;
            --border-color: #00ff66;
            --text-color: #00ff66;
            --btn-bg: #00220f;
            --btn-text: #00ff66;
            --glow-shadow: 0 0 20px rgba(0, 255, 102, 0.4);
        }

        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
            transition: background 0.6s ease, color 0.6s ease;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.22;
        }

        .top-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 999;
        }

        .top-btn {
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: var(--glow-shadow);
            transition: all 0.3s ease;
        }
        .top-btn:hover {
            background: var(--border-color);
            color: #000;
        }

        .coffee-btn { border-color: #ffaa00; color: #ffaa00; }

        .card { 
            background: var(--card-bg); 
            color: var(--text-color);
            padding: 25px; 
            border-radius: 12px; 
            border: 2px solid var(--border-color);
            box-shadow: var(--glow-shadow); 
            width: 440px; 
            text-align: center; 
            z-index: 10;
            max-height: 90vh;
            overflow-y: auto;
            transition: all 0.5s ease;
        }

        .card.desktop-view { width: 460px; }
        .card.tablet-view { width: 360px; }
        .card.mobile-view { width: 280px; }

        input, textarea { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            background: #020202;
            border: 1px solid var(--border-color); 
            color: var(--text-color);
            border-radius: 6px; 
            box-sizing: border-box; 
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
        }
        input:focus, textarea:focus {
            outline: none;
            box-shadow: 0 0 12px var(--glow-shadow);
        }

        button.action-btn { 
            background-color: var(--btn-bg); 
            color: var(--btn-text); 
            border: 1px solid var(--border-color); 
            padding: 11px; 
            width: 100%; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 14px; 
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            margin-top: 6px;
            box-shadow: var(--glow-shadow);
            transition: all 0.3s ease;
        }
        button.action-btn:hover { 
            background-color: var(--border-color); 
            color: #000;
        }

        .tool-btn-group {
            display: flex;
            gap: 8px;
            float: right;
            margin-bottom: 4px;
        }

        .mini-btn {
            background: #111;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            transition: 0.2s;
        }
        .mini-btn:hover {
            background: var(--border-color);
            color: #000;
        }

        .alt-btn {
            background: transparent;
            color: #00ffff;
            border: 1px dashed #00ffff;
            margin-top: 10px;
        }

        .message { margin-top: 10px; font-weight: bold; font-size: 12px; clear: both; }
        .bot-link { color: #00ffff; text-decoration: none; font-weight: bold; }
        
        .level-box { 
            margin-top: 8px; 
            padding: 10px; 
            border-radius: 6px; 
            border: 1px dashed var(--border-color); 
            text-align: left; 
            background: rgba(0, 255, 102, 0.03);
            font-size: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #0d0d0d;
            border: 2px solid var(--border-color);
            padding: 25px;
            width: 340px;
            border-radius: 12px;
            text-align: center;
            color: var(--text-color);
        }
        .device-option-btn {
            background: #111;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 10px;
            width: 100%;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            margin: 6px 0;
        }
        .device-option-btn:hover { background: var(--border-color); color: #000; }
        .close-modal { background: var(--border-color); color: #000; border: none; padding: 6px 15px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }

        .hidden { display: none; }
    </style>
</head>
<body id="body-theme">

    <canvas id="matrix-canvas"></canvas>

    <div class="top-controls">
        <button class="top-btn coffee-btn" onclick="openCoffeeModal()">☕ কফি</button>
        <button class="top-btn" onclick="openDeviceModal()" id="device-btn-indicator">🖥️ ডিভাইস</button>
    </div>

    <!-- কফি মোডাল -->
    <div id="coffee-modal" class="modal">
        <div class="modal-content" style="border-color: #ffaa00; color: #ffaa00;">
            <h3>☕ Buy Me a Coffee</h3>
            <p style="font-size: 12px; color: #fff;">বিকাশ/নগদ (Personal): 017XXXXXXXX</p>
            <button class="close-modal" style="background:#ffaa00;" onclick="closeCoffeeModal()">বন্ধ করুন</button>
        </div>
    </div>

    <!-- ডিভাইস মোডাল -->
    <div id="device-modal" class="modal">
        <div class="modal-content">
            <h3>⚙️ ডিভাইস মোড সিলেক্ট</h3>
            <button class="device-option-btn" onclick="changeDeviceView('desktop')">💻 কম্পিউটার মোড</button>
            <button class="device-option-btn" onclick="changeDeviceView('tablet')">📋 ট্যাবলেট মোড</button>
            <button class="device-option-btn" onclick="changeDeviceView('mobile')">📱 মোবাইল মোড</button>
            <button class="close-modal" onclick="closeDeviceModal()">বাতিল</button>
        </div>
    </div>

    <div class="card desktop-view" id="main-card">
        <h2 style="font-size: 18px; letter-spacing: 1px;">💀 ROOT_ACCESS // LOGIN</h2>
        
        <div id="step-telegram-login">
            <p>> টেলিগ্রাম ক্রডেনশিয়াল:</p>
            <input type="text" id="username" placeholder="Telegram Username (@username)">
            <input type="password" id="password" placeholder="Password">
            <button class="action-btn" onclick="loginStep1()">টেলিগ্রাম ওটিপি রিকোয়েস্ট</button>
            <div style="margin-top: 8px; font-size: 11px;">
                > বট না থাকলে: <a href="https://t.me/CryptoGuard_OTP_bot" target="_blank" class="bot-link">/start দিন</a>
            </div>
            <button class="action-btn alt-btn" onclick="switchForm('alt')">🔄 অল্টারনেটিভ লগইন</button>
        </div>

        <div id="step-alt-login" class="hidden">
            <p>> অল্টারনেটিভ এক্সেস:</p>
            <input type="text" id="alt-phone" placeholder="Phone Number">
            <input type="text" id="alt-name" placeholder="Full Name">
            <input type="password" id="alt-password" placeholder="Password">
            <button class="action-btn" onclick="alternativeLoginSubmit()">লগইন / রেজিস্টার</button>
            <button class="action-btn alt-btn" onclick="switchForm('telegram')">🔙 ফিরে যান</button>
        </div>

        <div id="step-otp" class="hidden">
            <p>> ৪-ডিজিটের ওটিপি দিন:</p>
            <input type="text" id="otp-code" placeholder="OTP" maxlength="4">
            <button class="action-btn" onclick="verifyOtp()">ভেরিফাই ওটিপি</button>
        </div>

        <!-- ড্যাশবোর্ড (সিম্পল সিঙ্গেল বক্স ও টুলবার) -->
        <div id="step-dashboard" class="hidden">
            <h3 style="font-size: 14px; margin-bottom: 5px;">> সিকিউরিটি ড্যাশবোর্ড</h3>
            
            <div class="level-box">
                <p style="margin: 0;"><b>লেভেল:</b> <span id="current-level-text">Level 1</span></p>
            </div>

            <div style="margin-top: 10px; text-align: left; font-size: 12px;">
                <div style="overflow: hidden;">
                    <label>> টেক্সট বা সাইফার কোড:</label>
                    <div class="tool-btn-group">
                        <button class="mini-btn" onclick="clearText()">🗑️ মুছুন</button>
                        <button class="mini-btn" onclick="copyText()">📋 কপি</button>
                    </div>
                </div>
                
                <!-- একমাত্র ইউনিভার্সাল বক্স -->
                <textarea id="universal-box" placeholder="এখানে নরমাল লেখা লিখলে এনক্রিপ্ট হবে, আর কোড বসালে ডিক্রিপ্ট হবে..." rows="4" oninput="syncAndSaveData()"></textarea>
                
                <!-- কার্যকারী বাটনসমূহ -->
                <button class="action-btn" onclick="processText('encrypt')" style="background: #003311;">🔒 এনক্রিপ্ট করো</button>
                <button class="action-btn" onclick="processText('decrypt')" style="background: #331100; border-color: #ffaa00; color: #ffaa00;">🔓 ডিক्रিপ্ট করো</button>
            </div>

            <button class="action-btn" onclick="nextSecurityLevel()" id="level-btn" style="margin-top: 10px; background: #002244;">লেভেল পরিবর্তন করুন</button>
        </div>

        <div class="message" id="response-msg"></div>
    </div>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const katakana = 'アカサタナハマヤラワイキシチニヒミリウクスツヌフムユルエケセテネヘメレオコソトノホモヨロワン0123456789ABCDEF';
        const alphabet = katakana + 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const rainDrops = [];
        for (let x = 0; x < columns; x++) { rainDrops[x] = 1; }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(3, 3, 3, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--border-color');
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) { rainDrops[i] = 0; }
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 30);

        function openCoffeeModal() { document.getElementById('coffee-modal').style.display = 'flex'; }
        function closeCoffeeModal() { document.getElementById('coffee-modal').style.display = 'none'; }
        function openDeviceModal() { document.getElementById('device-modal').style.display = 'flex'; }
        function closeDeviceModal() { document.getElementById('device-modal').style.display = 'none'; }

        function changeDeviceView(type) {
            const card = document.getElementById('main-card');
            const indicator = document.getElementById('device-btn-indicator');
            card.classList.remove('desktop-view', 'tablet-view', 'mobile-view');
            card.classList.add(type + '-view');
            indicator.innerText = type === 'desktop' ? "💻 কম্পিউটার" : (type === 'tablet' ? "📋 ট্যাবলেট" : "📱 মোবাইল");
            closeDeviceModal();
        }

        // বক্স কপি করার ফাংশন
        function copyText() {
            const textarea = document.getElementById('universal-box');
            if(!textarea.value) { alert("বক্স ফাঁকা!"); return; }
            textarea.select();
            navigator.clipboard.writeText(textarea.value).then(() => alert("ক্লিপবোর্ডে কপি করা হয়েছে! ✅"));
        }

        // বক্স ফাঁকা (ক্লিয়ার) করার নতুন ফাংশন
        function clearText() {
            const textarea = document.getElementById('universal-box');
            textarea.value = "";
            syncAndSaveData();
        }

        function switchForm(type) {
            document.getElementById('response-msg').innerText = "";
            if (type === 'alt') {
                document.getElementById('step-telegram-login').style.display = 'none';
                document.getElementById('step-alt-login').style.display = 'block';
            } else {
                document.getElementById('step-alt-login').style.display = 'none';
                document.getElementById('step-telegram-login').style.display = 'block';
            }
        }

        let currentIdentifier = "";
        let securityLevel = 1;

        function loginStep1() {
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value.trim();
            const msgDiv = document.getElementById('response-msg');

            if (!usernameInput || !passwordInput) {
                msgDiv.style.color = "#ff3333";
                msgDiv.innerText = "[ত্রুটি]: সব ফিল্ড পূরণ করুন!";
                return;
            }

            currentIdentifier = usernameInput.replace('@', '').toLowerCase();
            msgDiv.style.color = "#00ffff";
            msgDiv.innerText = "[প্রসেসিং]: ওটিপি পাঠানো হচ্ছে...";

            fetch('/login-step1', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: usernameInput, password: passwordInput })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    msgDiv.style.color = "#00ff66";
                    msgDiv.innerText = "> " + data.message;
                    document.getElementById('step-telegram-login').style.display = 'none';
                    document.getElementById('step-otp').style.display = 'block';
                } else {
                    msgDiv.style.color = "#ff3333";
                    msgDiv.innerText = "> " + data.message;
                }
            })
            .catch(() => { msgDiv.style.color = "#ff3333"; msgDiv.innerText = "[কানেকশন ফেইলড]"; });
        }

        function alternativeLoginSubmit() {
            const phone = document.getElementById('alt-phone').value.trim();
            const name = document.getElementById('alt-name').value.trim();
            const password = document.getElementById('alt-password').value.trim();
            const msgDiv = document.getElementById('response-msg');

            if (!phone || !name || !password) {
                msgDiv.style.color = "#ff3333";
                msgDiv.innerText = "[ত্রুটি]: তথ্য দিন!";
                return;
            }

            currentIdentifier = phone.toLowerCase();
            fetch('/alternative-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, name, password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    if (data.data) {
                        document.getElementById('universal-box').value = data.data.cipher_text || data.data.saved_text || "";
                        securityLevel = data.data.level || 1;
                    }
                    document.getElementById('step-alt-login').style.display = 'none';
                    document.getElementById('step-dashboard').style.display = 'block';
                    applyHackerTheme(securityLevel);
                } else {
                    msgDiv.style.color = "#ff3333";
                    msgDiv.innerText = "> " + data.message;
                }
            });
        }

        function verifyOtp() {
            const otpInput = document.getElementById('otp-code').value.trim();
            const msgDiv = document.getElementById('response-msg');

            fetch('/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: currentIdentifier, otp: otpInput })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    if (data.data) {
                        document.getElementById('universal-box').value = data.data.cipher_text || data.data.saved_text || "";
                        securityLevel = data.data.level || 1;
                    }
                    document.getElementById('step-otp').style.display = 'none';
                    document.getElementById('step-dashboard').style.display = 'block';
                    applyHackerTheme(securityLevel);
                } else {
                    msgDiv.style.color = "#ff3333";
                    msgDiv.innerText = "> " + data.message;
                }
            });
        }

        const MASTER_ENCRYPTION_KERNEL = "MIL_SPEC_X_2026_CORE_KEY_#$99";

        function processText(mode) {
            const box = document.getElementById('universal-box');
            const text = box.value.trim();
            if (!text) {
                alert("বক্সে কিছু লিখুন বা কোড দিন!");
                return;
            }

            if (mode === 'encrypt') {
                try {
                    let salt = Math.random().toString(36).substring(2, 10);
                    let payload = encodeURIComponent(text) + "::" + salt + "::" + MASTER_ENCRYPTION_KERNEL + "::" + currentIdentifier;
                    let layer1 = btoa(unescape(encodeURIComponent(payload)));
                    
                    let shifted = "";
                    const xorKey = (securityLevel * 19) + 47;
                    for (let i = 0; i < layer1.length; i++) {
                        shifted += String.fromCharCode(layer1.charCodeAt(i) ^ xorKey);
                    }

                    let layer2 = btoa(shifted).split('').reverse().join('');
                    box.value = "MIL_SECURE_LVL" + securityLevel + "_" + salt + "::" + layer2;
                    syncAndSaveData();
                    alert("এনক্রিপ্ট করা হয়েছে! 🔒");
                } catch (e) { alert("ত্রুটি ঘটেছে!"); }
            } 
            else if (mode === 'decrypt') {
                try {
                    let parts = text.split("::");
                    if (parts.length < 2) throw new Error();
                    
                    let unbased = atob(parts[1].split('
