<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacker Terminal - Secure Dashboard</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #0a0a0a;
            --border-color: #00ff66;
            --text-color: #00ff66;
            --btn-bg: #003311;
            --btn-hover: #00ff66;
            --btn-text: #00ff66;
        }

        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
            transition: all 0.4s ease;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.25;
        }

        .view-toggle-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #00ff66;
            color: #000;
            border: none;
            padding: 8px 15px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            z-index: 999;
            box-shadow: 0 0 10px #00ff66;
        }
        .view-toggle-btn:hover {
            background: #fff;
            box-shadow: 0 0 15px #fff;
        }

        .card { 
            background: var(--card-bg); 
            color: var(--text-color);
            padding: 25px; 
            border-radius: 8px; 
            border: 2px solid var(--border-color);
            box-shadow: 0px 0px 20px var(--border-color); 
            width: 420px; 
            text-align: center; 
            transition: all 0.4s ease-in-out;
            z-index: 10;
            max-height: 90vh;
            overflow-y: auto;
        }

        .card.mobile-view {
            width: 280px !important;
            padding: 15px !important;
            border-style: dashed;
        }

        input, textarea { 
            width: 100%; 
            padding: 8px; 
            margin: 8px 0; 
            background: #000;
            border: 1px solid var(--border-color); 
            color: var(--text-color);
            border-radius: 4px; 
            box-sizing: border-box; 
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
        }
        input:focus, textarea:focus {
            outline: none;
            box-shadow: 0 0 8px var(--border-color);
        }

        button.action-btn { 
            background-color: var(--btn-bg); 
            color: var(--btn-text); 
            border: 1px solid var(--border-color); 
            padding: 8px; 
            width: 100%; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 14px; 
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            transition: 0.3s; 
            margin-top: 5px;
        }
        button.action-btn:hover { 
            background-color: var(--btn-hover); 
            color: #000;
            box-shadow: 0 0 10px var(--border-color);
        }

        .message { margin-top: 10px; font-weight: bold; font-size: 12px; }
        .bot-link { color: #00ffff; text-decoration: none; font-weight: bold; }
        .bot-link:hover { text-decoration: underline; }
        
        .level-box { 
            margin-top: 10px; 
            padding: 10px; 
            border-radius: 5px; 
            border: 1px dashed var(--border-color); 
            text-align: left; 
            background: rgba(0, 255, 102, 0.05);
            font-size: 12px;
        }
        .hidden { display: none; }
    </style>
</head>
<body id="body-theme">

    <canvas id="matrix-canvas"></canvas>
    <button class="view-toggle-btn" onclick="toggleViewMode()" id="view-btn">📱 মোবাইল ভিউ</button>

    <div class="card" id="main-card">
        <h2 id="card-title" style="font-size: 20px;">💀 ROOT_ACCESS // LOGIN</h2>
        
        <!-- ধাপ ১: ইউজারনেম ও পাসওয়ার্ড -->
        <div id="step-login">
            <p>> এন্টার টেলিগ্রাম ক্রডেনশিয়াল:</p>
            <input type="text" id="username" placeholder="Telegram Username (@username)">
            <input type="password" id="password" placeholder="Password">
            <button class="action-btn" onclick="loginStep1()">বট ওটিপি রিকোয়েস্ট</button>
            <div style="margin-top: 10px; font-size: 12px;">
                > বট কানেক্ট না থাকলে: <a href="https://t.me/CryptoGuard_OTP_bot" target="_blank" class="bot-link">এখানে ক্লিক করে /start দিন</a>
            </div>
        </div>

        <!-- ধাপ ২: ওটিপি ভেরিফিকেশন -->
        <div id="step-otp" class="hidden">
            <p>> টেলিগ্রাম ওটিপি কোড ইনপুট করুন:</p>
            <input type="text" id="otp-code" placeholder="4-digit OTP" maxlength="4">
            <button class="action-btn" onclick="verifyOtp()">ভেরিফাই ওটিপি</button>
        </div>

        <!-- ধাপ ৩: ৩ লেভেলের এনক্রিপশন, ডিক্রিপশন ও থিম ড্যাশবোর্ড -->
        <div id="step-dashboard" class="hidden">
            <h3 id="dash-heading" style="font-size: 16px;">> সিস্টেম ড্যাশবোর্ড আনলকড</h3>
            
            <div class="level-box" id="level-display-box">
                <p><b>সিকিউরিটি লেভেল:</b> <span id="current-level-text">Level 1</span></p>
                <p><b>এনক্রিপশন প্রোটোকল:</b> <span id="enc-mode">AES-128 Active</span></p>
            </div>

            <!-- গোপন টেক্সট এনক্রিপশন ও ডিক্রিপশন টুল -->
            <div style="margin-top: 10px; text-align: left; font-size: 12px;">
                <label>> সিক্রেট টেক্সট এনক্রিপ্ট করুন:</label>
                <textarea id="plain-text" placeholder="নরমাল টেক্সট লিখুন..." rows="2" oninput="syncAndSaveData()"></textarea>
                <button class="action-btn" onclick="encryptText()">টেক্সট এনক্রিপ্ট করো</button>
                
                <p style="margin-top: 8px;"><b>এনক্রিপ্টেড আউটপুট:</b></p>
                <textarea id="cipher-text" placeholder="এনক্রিপ্ট হওয়ার পর এখানে দেখাবে..." rows="2" readonly style="color: #ffcc00;"></textarea>
                <button class="action-btn" onclick="decryptText()" style="background: #331100;">টেক্সট ডিক্রিপ্ট করো</button>
            </div>

            <button class="action-btn" onclick="nextSecurityLevel()" id="level-btn" style="margin-top: 12px; background: #0044cc;">লেভেল পরিবর্তন করুন</button>
        </div>

        <div class="message" id="response-msg"></div>
    </div>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const katakana = 'アカサタナハマヤラワイキシチニヒミリウクスツヌフムユルエケセテネヘメレオコソトノホモヨロワン0123456789ABCDEF';
        const alphabet = katakana + 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const rainDrops = [];
        for (let x = 0; x < columns; x++) { rainDrops[x] = 1; }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff66';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) { rainDrops[i] = 0; }
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 30);

        let isMobileView = false;
        function toggleViewMode() {
            const card = document.getElementById('main-card');
            const btn = document.getElementById('view-btn');
            isMobileView = !isMobileView;
            if (isMobileView) {
                card.classList.add('mobile-view');
                btn.innerText = "💻 ল্যাপটপ ভিউ";
            } else {
                card.classList.remove('mobile-view');
                btn.innerText = "📱 মোবাইল ভিউ";
            }
        }

        let currentUsername = "";
        let securityLevel = 1;

        function loginStep1() {
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value.trim();
            const msgDiv = document.getElementById('response-msg');

            if (!usernameInput || !passwordInput) {
                msgDiv.style.color = "#ff3333";
                msgDiv.innerText = "[ত্রুটি]: সব ফিল্ড পূরণ করুন!";
                return;
            }

            currentUsername = usernameInput;
            msgDiv.style.color = "#00ffff";
            msgDiv.innerText = "[প্রসেসিং]: ওটিপি পাঠানো হচ্ছে...";

            fetch('/login-step1', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: currentUsername, password: passwordInput })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    msgDiv.style.color = "#00ff66";
                    msgDiv.innerText = "> " + data.message;
                    document.getElementById('step-login').style.display = 'none';
                    document.getElementById('step-otp').style.display = 'block';
                } else {
                    msgDiv.style.color = "#ff3333";
                    msgDiv.innerText = "> " + data.message;
                }
            })
            .catch(() => {
                msgDiv.style.color = "#ff3333";
                msgDiv.innerText = "[কানেকশন ফেইলড]";
            });
        }

        function verifyOtp() {
            const otpInput = document.getElementById('otp-code').value.trim();
            const msgDiv = document.getElementById('response-msg');

            if (!otpInput) {
                msgDiv.style.color = "#ff3333";
                msgDiv.innerText = "[ত্রুটি]: ওটিপি কোড দিন!";
                return;
            }

            msgDiv.style.color = "#00ffff";
            msgDiv.innerText = "[যাচাই হচ্ছে]...";

            fetch('/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: currentUsername, otp: otpInput })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    msgDiv.style.color = "#00ff66";
                    msgDiv.innerText = "> " + data.message;
                    
                    // পুরানো বা সেভ করা ডেটা রিকভার করে ফিল্ডে বসানো
                    if (data.data) {
                        document.getElementById('plain-text').value = data.data.saved_text || "";
                        document.getElementById('cipher-text').value = data.data.cipher_text || "";
                        securityLevel = data.data.level || 1;
                    }

                    setTimeout(() => {
                        document.getElementById('step-otp').style.display = 'none';
                        document.getElementById('step-dashboard').style.display = 'block';
                        msgDiv.innerText = "";
                        applyHackerTheme(securityLevel);
                    }, 1000);
                } else {
                    msgDiv.style.color = "#ff3333";
                    msgDiv.innerText = "> " + data.message;
                }
            })
            .catch(() => {
                msgDiv.style.color = "#ff3333";
                msgDiv.innerText = "[সার্ভার এরর]";
            });
        }

        function encryptText() {
            const text = document.getElementById('plain-text').value;
            if (!text) {
                alert("দয়া করে এনক্রিপ্ট করার মতো টেক্সট লিখুন!");
                return;
            }
            let encoded = btoa(encodeURIComponent(text)).split('').reverse().join('');
            let cipherResult = "ENC_SECURE::" + encoded;
            document.getElementById('cipher-text').value = cipherResult;
            syncAndSaveData();
        }

        function decryptText() {
            const cipher = document.getElementById('cipher-text').value;
            if (!cipher) {
                alert("ডিক্রিপ্ট করার মতো কোনো সাইফারটেক্সট নেই!");
                return;
            }
            try {
                let pureCipher = cipher.replace("ENC_SECURE::", "").split('').reverse().join('');
                let decoded = decodeURIComponent(atob(pureCipher));
                document.getElementById('plain-text').value = decoded;
                syncAndSaveData();
                alert("সফলভাবে ডিক্রিপ্ট করা হয়েছে!");
            } catch (e) {
                alert("ডিক্রিপশন ফেইলড!");
            }
        }

        // সার্ভারে ডেটা অটো সিন্স ও সেভ করা
        function syncAndSaveData() {
            const savedText = document.getElementById('plain-text').value;
            const cipherText = document.getElementById('cipher-text').value;

            fetch('/save-user-data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: currentUsername,
                    saved_text: savedText,
                    cipher_text: cipherText,
                    level: securityLevel
                })
            });
        }

        function nextSecurityLevel() {
            securityLevel++;
            if (securityLevel > 3) securityLevel = 1;
            applyHackerTheme(securityLevel);
            syncAndSaveData();
        }

        function applyHackerTheme(level) {
            const root = document.documentElement;
            const levelText = document.getElementById('current-level-text');
            const encMode = document.getElementById('enc-mode');
            const levelBtn = document.getElementById('level-btn');

            if (level === 1) {
                root.style.setProperty('--border-color', '#00ff66');
                root.style.setProperty('--text-color', '#00ff66');
                root.style.setProperty('--btn-bg', '#003311');
                root.style.setProperty('--btn-hover', '#00ff66');
                root.style.setProperty('--btn-text', '#00ff66');
                levelText.innerText = "Level 1 (Standard Matrix)";
                encMode.innerText = "AES-128 Active";
                levelBtn.innerText = "উন্নীত করুন (লেভেল ২ - সাইবার ব্লু)";
            } 
            else if (level === 2) {
                root.style.setProperty('--border-color', '#00ccff');
                root.style.setProperty('--text-color', '#00ccff');
                root.style.setProperty('--btn-bg', '#002233');
                root.style.setProperty('--btn-hover', '#00ccff');
                root.style.setProperty('--btn-text', '#00ccff');
                levelText.innerText = "Level 2 (Cyber Blue Mode)";
                encMode.innerText = "AES-256 Dual Layer";
                levelBtn.innerText;
                levelBtn.innerText = "উন্নীত করুন (লেভেল ৩ - রেড অ্যালার্ট)";
            } 
            else if (level === 3) {
                root.style.setProperty('--border-color', '#ff3333');
                root.style.setProperty('--text-color', '#ff3333');
                root.style.setProperty('--btn-bg', '#330000');
                root.style.setProperty('--btn-hover', '#ff3333');
                root.style.setProperty('--btn-text', '#ff3333');
                levelText.innerText = "Level 3 (Danger / Root Mode)";
                encMode.innerText = "Quantum Encryption Active";
                levelBtn.innerText = "ফিরে যান (লেভেল ১ - ম্যাট্রিক্স)";
            }
        }
    </script>
</body>
</html>
