<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SECURE_CORE_TERMINAL</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; }
        .panel { width: 350px; margin: 50px auto; padding: 20px; border: 1px solid #00ff41; background: #050505; text-align: center; }
        .btn { border: 1px solid #00ff41; background: none; color: #00ff41; padding: 10px; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn:hover { background: #00ff41; color: #000; }
        input, textarea { width: 100%; background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        .hidden { display: none; }
        #timer { font-size: 18px; margin-bottom: 10px; color: #fff; }
    </style>
</head>
<body>
    <div id="name-ui" class="panel">
        <h3>[ OPERATOR_ID ]</h3>
        <input type="text" id="username" placeholder="NAME">
        <button class="btn" onclick="startSession()">[ ACCESS ]</button>
    </div>

    <div id="main-ui" class="panel hidden">
        <div id="timer">TIME: 00:00</div>
        <h3>[ CORE_ENCRYPTION ]</h3>
        <textarea id="msg" placeholder="MESSAGE..."></textarea>
        <button class="btn" onclick="proc('encrypt')">[ ENCRYPT ]</button>
        <button class="btn" onclick="proc('decrypt')">[ DECRYPT ]</button>
        <div id="out" style="border:1px dashed #00ff41; padding:10px; margin-top:10px;">OUTPUT</div>
    </div>

    <script>
        let username, startTime, timerInterval;

        function startSession() {
            username = document.getElementById('username').value;
            if(!username) return;
            fetch('/login_notify', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username}) });
            document.getElementById('name-ui').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            startTime = Date.now();
            timerInterval = setInterval(() => {
                let s = Math.floor((Date.now()-startTime)/1000);
                document.getElementById('timer').innerText = `TIME: ${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
            }, 1000);
        }

        async function proc(action) {
            let res = await fetch('/process', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({message: document.getElementById('msg').value, action, username}) });
            let data = await res.json();
            document.getElementById('out').innerText = data.result;
        }

        window.onbeforeunload = () => {
            let dur = document.getElementById('timer').innerText;
            navigator.sendBeacon('/session_end', JSON.stringify({username, duration: dur}));
        };
    </script>
</body>
</html>
